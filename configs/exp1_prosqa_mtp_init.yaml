experiment_name: exp1_prosqa_mtp_init
data:
  train_path: dataset/prosqa_train.json
  valid_path: dataset/prosqa_valid.json
  test_path: dataset/prosqa_test.json
  train_max_records:
  valid_max_records:
  test_max_records:
  max_prefix_tokens: 256
  max_step_tokens: 64
  max_horizon: 1
  batch_size: 16
  num_workers: 8
  text_separator: "\n"
  drop_empty_steps: true
model:
  backbone_type: gpt2
  tokenizer_name_or_path: gpt2
  model_name_or_path: /home/jyzhang/download/gpt2-self-mtp
  vocab_size: 50257
  embedding_dim: 256
  hidden_dim: 256
  latent_dim: 256
  n_layer: 4
  n_head: 4
  n_positions: 512
  dropout: 0.1
  init_source: mtp
  init_checkpoint:
codec_objective:
  name: standard
  horizon_weights: [1.0]
train:
  epochs: 5
  learning_rate: 0.0003
  weight_decay: 0.01
  grad_clip_norm: 1.0
  seed: 42
  device: cuda:2
  precision: bf16
  allow_tf32: true
  output_dir: outputs/exp1_prosqa_mtp_init
  tensorboard_dir: outputs/exp1_prosqa_mtp_init/tensorboard
  log_every: 20
