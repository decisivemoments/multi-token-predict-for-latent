experiment_name: exp2a_gsm_ntp_init
data:
  train_path: dataset/gsm_train.json
  valid_path: dataset/gsm_valid.json
  test_path: dataset/gsm_test.json
  max_prefix_tokens: 256
  max_step_tokens: 64
  max_horizon: 1
  batch_size: 8
  num_workers: 8
  text_separator: "\n"
  drop_empty_steps: true
model:
  backbone_type: gpt2
  tokenizer_name_or_path: /inspire/ssd/project/pretrain-test/p-shangli/jyzhang/model/gpt2-self-ntp
  model_name_or_path: /inspire/ssd/project/pretrain-test/p-shangli/jyzhang/model/gpt2-self-ntp
  latent_dim: 768
  init_source: ntp
codec_objective:
  name: decoder_token_mtp
  horizon_weights: [1.0]
  token_prediction_horizons: [1, 2, 3]
  token_prediction_weights: [1.0, 0.5, 0.25]
  answer_loss_weight: 2.0
train:
  epochs: 5
  learning_rate: 0.0003
  weight_decay: 0.01
  grad_clip_norm: 1.0
  seed: 42
  device: cuda
  precision: bf16
  allow_tf32: true
  output_dir: outputs/exp2a_gsm_ntp_init
  tensorboard_dir: outputs/exp2a_gsm_ntp_init/tensorboard
  log_every: 20
  distributed_backend: nccl
