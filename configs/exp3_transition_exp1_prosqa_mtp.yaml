experiment_name: exp3_transition_exp1_prosqa_mtp
data:
  train_path: dataset/prosqa_train.json
  valid_path: dataset/prosqa_valid.json
  test_path: dataset/prosqa_test.json
  max_prefix_tokens: 256
  max_step_tokens: 64
  max_horizon: 1
  batch_size: 8
  num_workers: 8
  text_separator: "\n"
  drop_empty_steps: true
model:
  backbone_type: gpt2
  tokenizer_name_or_path: /inspire/ssd/project/pretrain-test/p-shangli/jyzhang/model/gpt2-self-mtp
  model_name_or_path: /inspire/ssd/project/pretrain-test/p-shangli/jyzhang/model/gpt2-self-mtp
  vocab_size: 50257
  embedding_dim: 256
  hidden_dim: 256
  latent_dim: 256
  n_layer: 4
  n_head: 4
  n_positions: 512
  max_token_mtp_horizon: 1
  dropout: 0.1
  init_source: mtp
transition:
  codec_checkpoint: outputs/exp1_prosqa_mtp_init/codec_best.pt
  type_loss_weight: 1.0
  decode_loss_weight: 1.0
train:
  epochs: 5
  learning_rate: 0.0003
  weight_decay: 0.01
  grad_clip_norm: 1.0
  seed: 42
  device: cuda
  precision: bf16
  allow_tf32: true
  output_dir: outputs/exp3_transition_exp1_prosqa_mtp
  tensorboard_dir: outputs/exp3_transition_exp1_prosqa_mtp/tensorboard
  log_every: 20
  valid_generate_examples: 8
  distributed_backend: nccl
